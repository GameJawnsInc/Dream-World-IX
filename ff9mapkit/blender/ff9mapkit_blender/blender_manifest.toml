schema_version = "1.0.0"

id = "ff9mapkit_blender"
version = "0.4.1"
name = "FF9 Map Kit"
tagline = "Visually author FF9 custom-field cameras and walkmeshes"
maintainer = "FF9 Map Kit contributors"
type = "add-on"

# Targets Blender 4.2+ (tested intent: 5.x). Pure-Python; no wheels.
blender_version_min = "4.2.0"

license = ["SPDX:MIT"]

tags = ["Import-Export", "3D View"]

# The Export / Compute-Paint-Guide operators read painted layers and write the exported field
# assets (camera.bgx, walkmesh.obj, field.toml, guide.txt) to the folder you choose.
[permissions]
files = "Read painted layers; write exported camera.bgx / walkmesh.obj / field.toml / guide.txt"
