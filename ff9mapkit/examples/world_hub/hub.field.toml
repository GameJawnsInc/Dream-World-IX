# ============================================================================
#  WORLD HUB -- generated by `ff9mapkit gen-hub` from journeys.toml.
#  A journey selector: walk as the Moogle, talk to the narrator -> a menu of journeys ->
#  each row warps you into that journey's entry field (the in-game-proven choice `warp`
#  action + `[player] model=`). REGENERATE after editing the journeys.toml -- this file is a
#  build artifact, hand edits are overwritten. (memory: project-ff9-world-hub)
# ============================================================================

[field]
id = 4500
name = "WORLD_HUB"
borrow_bg = "GRGR_MAP420_GR_CEN_0"   # a real room as the backdrop (area >= 10)
area = 21
text_block = 8   # a real MesDB id NOT shadowed by a higher mod folder

[camera]
borrow = "camera_hub.bgx"   # the borrowed room's camera (gitignored; extract from your install)

[player]
spawn = [404, 127]
model = 220   # walk the hub as the Moogle ([player] model=)

[[npc]]
name = "Stiltzkin"   # the narrator -- talk to open the journey menu
pos = [480, 127]
model = 212

# The journey menu: each option warps to a journey's entry field; set_scenario (optional) seeds
# the beat hub-side before the warp. The trailing row has no warp -- it just closes the menu.
[[choice]]
npc = "Stiltzkin"
prompt = "Kupo! Which journey will you take?"
cancel = 2                  # B / cancel -> the last row (no warp)

[[choice.options]]
text = "The Village of Dali"
warp = 4100
set_scenario = 2600

[[choice.options]]
text = "The Ice Cavern"
warp = 30100

[[choice.options]]
text = "Stay here, kupo..."   # no warp -- closes the menu
