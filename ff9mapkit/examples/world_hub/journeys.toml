# ============================================================================
#  WORLD HUB registry -- the generator input for `ff9mapkit gen-hub`.
#
#  `ff9mapkit gen-hub journeys.toml` emits a hub.field.toml (the journey-selector
#  field) from this small registry: per journey just {title, entry field id, seed}.
#  Build/deploy the emitted field.toml like any field. (memory: project-ff9-world-hub)
#
#  REAL DESTINATIONS (2026-06-13): the journeys below warp into REAL forked slices
#  already deployed in stacked mod folders -- NOT the trivial scaffold stubs (4501/4502).
#  The hub stays THIN: it only needs each journey's {entry id, optional seed}; HOW a
#  journey plays internally is the slice's own business (its own .eb/.mes/walkmesh).
#    * Dali       -> field 4100  -- a VERBATIM (native) fork: the REAL Dali story, real
#                    lines, real party-setup. story_flags' DALI_CAPSTONE chain, in
#                    FF9CustomMap-sf (source field 359). The faithful flagship.
#    * Ice Cavern -> field 30100 -- an EDITABLE import-chain fork: the real Ice Cavern
#                    geometry/camera to explore (re-authorable scaffold logic).
#                    overworld's ICE_CAVERN chain, in FF9CustomMap-ow (source field 300).
#  Both ids are already registered in the live `Memoria.ini` FolderNames, so picking a
#  journey `Field()`-warps straight into it -- only the HUB (4500) is (re)deployed.
# ============================================================================

[hub]
name      = "WORLD_HUB"
id        = 4500
borrow_bg = "GRGR_MAP420_GR_CEN_0"   # a real room as the backdrop (swap to ANY area>=10 field for theme)
area      = 21
borrow_field = 950                   # the real field this room IS -> `gen-hub --extract-camera` caches its camera
camera    = "camera_hub.bgx"         # default camera path (overridden by --extract-camera to the cache copy)
text_block = 8                       # a real MesDB id NOT shadowed by the higher FF9CustomMap folder (1073 IS)
prompt    = "Kupo! Which journey will you take?"
stay_text = "Stay here, kupo..."     # the trailing no-warp (cancel) row
player_model   = 220                 # walk the hub as the iconic Moogle (220 = GEO_NPC_F0_MOG, the save moogle)
player_spawn   = [404, 127]
narrator       = "Stiltzkin"         # the narrator moogle
narrator_model = 212                 # Stiltzkin's ACTUAL rig (GEO_NPC_F3_MOG) -- confirmed from Mognet Central
                                     # (field 3100): the NPC named "Stiltzkin" SetModels 212 (not 220 = the
                                     # white save-moogle). He even says "Maybe I'll go on a journey again." kupo
narrator_pos   = [480, 127]

[[journey]]
name  = "dali"
title = "The Village of Dali"
entry = 4100                         # DC_DL_ENT -- VERBATIM Dali entrance (FF9CustomMap-sf; real story + lines)
set_scenario = 2600                  # "Waking up in Dali" -- the beat the verbatim logic expects (its own [startup])

[[journey]]
name  = "ice_cavern"
title = "The Ice Cavern"
entry = 30100                        # IC_ENT -- EDITABLE Ice Cavern chain entry (FF9CustomMap-ow; real geometry)
