# FF9 named-flag REGISTRY SEED  (research/flag_catalog.toml)
#
# Generated by research/make_catalog.py. A starter index<->name<->meaning table for a future kit flag
# registry (STORY_FLAGS.md section 5 item 2). Tiers: a = engine/decompilation-grounded, b = corroborated
# empirical, c = uncertain. Bit index N -> byte N>>3 bit N&7; Byte/Int16/UInt16 index = byte offset.
# HW-naming trap: HW 'GlobBool' = engine Map (TRANSIENT); HW 'GenBool' = engine Global (PERSISTENT).
# Do NOT label the persistent gEventGlobal space 'Glob'.

[meta]
source = "research/flag_census.json (676 fields) + Memoria Assembly-CSharp + Hades Workshop"
real_bit_flag_max = 8511   # max gEventGlobal BIT used by any real field

# --- Recommended provably-safe custom-flag allocation bands (all clear of real-FF9 usage) ---
[safe_bands]
first_clear_bit = 8512        # byte 1064; first bit clear of ALL real usage (max real bit = 8511)
campaign_flag_base = 8512     # recommend 8512 (round 8520/8600); was 8300 (collides w/ chest 8376-8511)
flags_per_field = 64
choice_scratch_floor = 16320  # byte 2040; reserve at/above this (engine/kit-owned)
max_safe_fields = 122         # (16320 - 8512) // 64

